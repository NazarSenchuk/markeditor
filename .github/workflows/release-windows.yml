name: Release (Windows Installer)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Install WiX Toolset (needed for .exe installer)
        run: choco install wixtoolset -y

      - name: Build + Test
        run: mvn -B clean test

      - name: Build JAR + Copy Runtime Deps
        run: mvn -B -DskipTests package dependency:copy-dependencies -DincludeScope=runtime -DoutputDirectory=target/deps

      - name: Build Windows Installer (.exe)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $appName   = "SimpleDocEditor"
          $mainClass = "com.markeditor.App"

          $pomVersion = (mvn -q -DforceStdout help:evaluate -Dexpression=project.version).Trim()
          if (-not $pomVersion) { $pomVersion = "1.0.0" }
          $pomVersion = $pomVersion.Replace("-SNAPSHOT", "")

          $refName = "${{ github.ref_name }}".Trim()
          $version = $pomVersion
          if ($refName -and $refName.StartsWith("v")) { $version = $refName.Substring(1) }
          if (-not ($version -match '^\d+(\.\d+){0,3}$')) { $version = $pomVersion }

          $jar = Get-ChildItem -Path target -Filter "*.jar" |
            Where-Object { $_.Name -notmatch "sources|javadoc|original" } |
            Select-Object -First 1
          if (-not $jar) { throw "App JAR not found in target/. Build step may have failed." }

          New-Item -ItemType Directory -Force -Path "dist/input" | Out-Null
          Copy-Item $jar.FullName "dist/input/"
          Copy-Item "target/deps/*.jar" "dist/input/"

          jpackage `
            --type exe `
            --dest dist `
            --input "dist/input" `
            --name $appName `
            --app-version $version `
            --main-jar $jar.Name `
            --main-class $mainClass `
            --win-menu `
            --win-shortcut `
            --win-dir-chooser `
            --vendor "SimpleDocEditor" `
            --description "Markdown editor with Pandoc export"

          Get-ChildItem dist -Filter "*.exe" | ForEach-Object { Write-Host "Built: $($_.FullName)" }

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true

